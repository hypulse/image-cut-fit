<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: transparent;
      color: rgb(49, 51, 63);
    }

    .paste-area {
      width: 100%;
      min-height: 122px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px dashed rgba(49, 51, 63, 0.34);
      border-radius: 6px;
      background: rgb(250, 250, 250);
      outline: none;
      cursor: text;
      text-align: center;
      transition:
        border-color 120ms ease,
        box-shadow 120ms ease,
        background-color 120ms ease;
    }

    .paste-area:focus,
    .paste-area.is-active {
      border-color: rgb(255, 75, 75);
      box-shadow: 0 0 0 1px rgba(255, 75, 75, 0.35);
      background: rgb(255, 255, 255);
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }

    .hint,
    .status {
      padding: 0 12px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(49, 51, 63, 0.72);
    }

    .status {
      min-height: 17px;
    }
  </style>
</head>
<body>
  <div id="paste-area" class="paste-area" tabindex="0" role="button" aria-label="클립보드 이미지 붙여넣기">
    <div class="title">클립보드 붙여넣기</div>
    <div class="hint">영역을 클릭한 뒤 이미지를 붙여넣으세요.</div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const Streamlit = {
      setComponentReady() {
        window.parent.postMessage(
          { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
          "*",
        );
      },
      setComponentValue(value) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: "streamlit:setComponentValue",
            value,
            dataType: "json",
          },
          "*",
        );
      },
      setFrameHeight(height) {
        window.parent.postMessage(
          { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height },
          "*",
        );
      },
    };

    const pasteArea = document.getElementById("paste-area");
    const statusElement = document.getElementById("status");

    function setStatus(message) {
      statusElement.textContent = message;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          resolve({
            name: file.name || "",
            type: file.type || "image/png",
            size: file.size || 0,
            data_url: reader.result,
          });
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function clipboardImageFiles(dataTransfer) {
      const files = [];
      for (const file of Array.from(dataTransfer.files || [])) {
        if (file.type.startsWith("image/")) files.push(file);
      }

      if (files.length > 0) return files;

      for (const item of Array.from(dataTransfer.items || [])) {
        if (item.kind === "file" && item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (file) files.push(file);
        }
      }

      return files;
    }

    async function handlePaste(event) {
      const files = clipboardImageFiles(event.clipboardData);
      if (files.length === 0) {
        setStatus("클립보드에 이미지가 없습니다.");
        return;
      }

      event.preventDefault();
      pasteArea.classList.add("is-active");
      setStatus("이미지를 읽는 중...");

      try {
        const images = await Promise.all(files.map(fileToDataUrl));
        Streamlit.setComponentValue({
          id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
          images,
        });
        setStatus(`${images.length}개 이미지 추가됨`);
      } catch (error) {
        setStatus("이미지를 읽지 못했습니다.");
      } finally {
        window.setTimeout(() => pasteArea.classList.remove("is-active"), 300);
      }
    }

    pasteArea.addEventListener("click", () => pasteArea.focus());
    pasteArea.addEventListener("paste", handlePaste);
    document.addEventListener("paste", (event) => {
      if (event.defaultPrevented) return;
      handlePaste(event);
    });

    window.addEventListener("message", (event) => {
      if (event.data.type !== "streamlit:render") return;
      Streamlit.setFrameHeight(128);
    });

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(128);
  </script>
</body>
</html>
